name: Deploy

on:
  # 在针对 `main` 分支的推送上运行。如果你
  # 使用 `master` 分支作为默认分支，请将其更改为 `master`
  push:
    branches: [master]

  # 允许你从 Actions 选项卡手动运行此工作流程
  workflow_dispatch:
    inputs:
      deploy_to_server:
        description: '部署到自己的服务器（使用已有构建产物）'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时进行一次部署，跳过正在运行和最新队列之间的运行队列
# 但是，不要取消正在进行的运行，因为我们希望允许这些生产部署完成
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建工作（push 到 master 时或手动部署到服务器时执行）
  build:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_to_server == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 如果未启用 lastUpdated，则不需要
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Install dependencies
        run: npm ci
      - name: Build with VitePress
        run: npm run docs:build
      # 上传构建产物供其他 job 使用
      - name: Upload artifact for server deployment
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifact
          path: dist
          retention-days: 7   # 保留7天
      # 上传用于 GitHub Pages 的 artifact
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # 部署到 GitHub Pages（仅在 push 到 master 时自动执行，手动部署服务器时不执行）
  deploy-github-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 部署到服务器（手动触发，使用已构建的 artifact）
  deploy-to-server:
    environment: github-pages   # 指定环境名称，需要在github-pages环境中配置变量SERVER_HOST、SERVER_USER等，这样不需要在全局配置
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_to_server == 'true'
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Server
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-artifact
          path: dist

      - name: Prepare server for deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # 创建备份目录
            mkdir -p ${{ secrets.SERVER_DEPLOY_PATH }}/backups

            # 备份现有文件（先删除超过5份的旧备份）
            if [ -d "${{ secrets.SERVER_DEPLOY_PATH }}" ] && [ "$(ls -A ${{ secrets.SERVER_DEPLOY_PATH }} 2>/dev/null | grep -v '^backups$')" ]; then
              cd ${{ secrets.SERVER_DEPLOY_PATH }}/backups

              # 删除超过5份的旧备份（保留最新的5份）
              ls -t backup_*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm -f

              # 创建新备份
              cd ${{ secrets.SERVER_DEPLOY_PATH }}
              tar -czf backups/backup_$(date +%Y%m%d_%H%M%S).tar.gz --exclude='backups' .
            fi

            # 清空部署目录（保留 backups 目录）
            cd ${{ secrets.SERVER_DEPLOY_PATH }}
            find . -maxdepth 1 -mindepth 1 ! -name 'backups' -exec rm -rf {} +

      - name: Upload files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "dist/*"
          target: "${{ secrets.SERVER_DEPLOY_PATH }}"
          strip_components: 1


