name: Deploy

on:
  # 在针对 `main` 分支的推送上运行。如果你
  # 使用 `master` 分支作为默认分支，请将其更改为 `master`
  push:
    branches: [master]

  # 允许你从 Actions 选项卡手动运行此工作流程
  workflow_dispatch:
    inputs:
      deploy_to_server:
        description: '是否部署到自己的服务器'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      test_ssh_only:
        description: '仅测试 SSH 连接（不部署）'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时进行一次部署，跳过正在运行和最新队列之间的运行队列
# 但是，不要取消正在进行的运行，因为我们希望允许这些生产部署完成
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建工作
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 如果未启用 lastUpdated，则不需要
      # - uses: pnpm/action-setup@v3 # 如果使用 pnpm，请取消此区域注释
      #   with:
      #     version: 9
      # - uses: oven-sh/setup-bun@v1 # 如果使用 Bun，请取消注释
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm # 或 pnpm / yarn
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Install dependencies
        run: npm ci # 或 pnpm install / yarn install / bun install
      - name: Build with VitePress
        run: npm run docs:build # 或 pnpm docs:build / yarn docs:build / bun run docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # 部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 部署到自己的服务器（仅在手动触发时执行）
  deploy-to-server:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_to_server == 'true' && github.event.inputs.test_ssh_only == 'false'
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Debug - Check secrets
        run: |
          echo "Checking secrets..."
          echo "SERVER_HOST is configured: ${{ secrets.SERVER_HOST != '' }}"
          echo "SERVER_USER is configured: ${{ secrets.SERVER_USER != '' }}"
          echo "SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}"


      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # 备份现有文件
            if [ -d "${{ secrets.SERVER_DEPLOY_PATH }}" ]; then
              cd ${{ secrets.SERVER_DEPLOY_PATH }}
              tar -czf backup_$(date +%Y%m%d_%H%M%S).tar.gz .
            fi

            # 创建目录（如果不存在）
            mkdir -p ${{ secrets.SERVER_DEPLOY_PATH }}

            # 清空目录
            cd ${{ secrets.SERVER_DEPLOY_PATH }}
            rm -rf ./*

            # 退出 SSH，准备上传文件
            exit

      - name: Upload files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "dist/*"
          target: "${{ secrets.SERVER_DEPLOY_PATH }}"
          strip_components: 1

      - name: Cleanup old backups (keep last 5)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.SERVER_DEPLOY_PATH }}
            ls -t backup_*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm -f

  # 仅测试 SSH 连接（不构建和部署）
  test-ssh:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_ssh_only == 'true'
    runs-on: ubuntu-latest
    name: Test SSH Connection
    steps:
      - name: Test SSH connection
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "✅ SSH 连接成功！"
            echo "================================"
            echo "当前用户: $(whoami)"
            echo "当前目录: $(pwd)"
            echo "服务器时间: $(date)"
            echo "操作系统: $(cat /etc/os-release | grep PRETTY_NAME)"
            echo "================================"
            echo "目标部署路径: ${{ secrets.SERVER_DEPLOY_PATH }}"

            if [ -d "${{ secrets.SERVER_DEPLOY_PATH }}" ]; then
              echo "✅ 目标目录存在"
              echo "目录内容："
              ls -la ${{ secrets.SERVER_DEPLOY_PATH }}
            else
              echo "⚠️ 目标目录不存在，将在部署时自动创建"
            fi
            echo "================================"
            echo "磁盘空间："
            df -h
